[build]
  command = "npm run build"
  publish = "dist"
  ignore = "node ./scripts/netlify-ignore.js"

[build.environment]
  NODE_VERSION = "20"

# Example for SPA routers. Remove if the app is not a client-side SPA.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
  APP_ENV = "production"

[context.deploy-preview.environment]
  APP_ENV = "preview"

[context.branch-deploy.environment]
  APP_ENV = "branch"

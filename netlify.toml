[build]
  command = "npm run build"
  publish = "out"
  ignore = "node ./scripts/netlify-ignore.js"

[build.environment]
  NODE_VERSION = "20"

[context.production.environment]
  APP_ENV = "production"

[context.deploy-preview.environment]
  APP_ENV = "preview"

[context.branch-deploy.environment]
  APP_ENV = "branch"
